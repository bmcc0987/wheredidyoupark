<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Where Did You Park?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 64px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    .title {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 28px;
    }
    .number {
      font-size: 120px;
      font-weight: 800;
      color: #111;
      line-height: 1;
      margin-bottom: 24px;
    }
    .label {
      font-size: 14px;
      color: #aaa;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🅿️</div>
    <div class="title">Where Did You Park?</div>
    <div class="subtitle">You parked on floor</div>
    <div class="number" id="num">6</div>

  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const n = params.get('n');
    if (n) document.getElementById('num').textContent = n;
  </script>
</body>
</html>
