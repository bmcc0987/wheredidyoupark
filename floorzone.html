<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Where Did You Park?</title>
  <meta name="color-scheme" content="light only">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #1a1a2e; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color-scheme: light only;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 32px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    .title {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 24px;
    }
    .boxes {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .box {
      background: #f5f5f5;
      border-radius: 14px;
      padding: 16px 24px;
    }
    .box-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .box-num {
      font-size: 72px;
      font-weight: 800;
      color: #111;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🅿️</div>
    <div class="title">Where Did You Park?</div>
    <div class="subtitle">You parked on</div>
    <div class="boxes">
      <div class="box">
        <div class="box-label">Floor</div>
        <div class="box-num" id="floor">7</div>
      </div>
      <div class="box">
        <div class="box-label">Zone</div>
        <div class="box-num" id="zone">A</div>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const floor = params.get('floor');
    const zone = params.get('zone');
    if (floor) document.getElementById('floor').textContent = floor;
    if (zone) document.getElementById('zone').textContent = zone;
  </script>
</body>
</html>
