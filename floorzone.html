<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light only">
<title>Floor 7 Zone A Placard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}
.placard {
  width: 320px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #ddd;
  box-shadow: 0 2px 16px rgba(0,0,0,0.12);
}
.top {
  background: #2952a3;
  padding: 28px 24px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.top .label {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.top .floor {
  font-size: 42px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.middle {
  background: #fff;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.middle .scan-label {
  font-size: 12px;
  font-weight: 600;
  color: #888;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.middle img {
  width: 200px;
  height: 200px;
  image-rendering: pixelated;
}
.bottom {
  background: #f5efe0;
  padding: 20px 24px 24px;
}
.bottom .how-title {
  font-size: 11px;
  font-weight: 600;
  color: #8a7040;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.steps { display: flex; flex-direction: column; gap: 10px; }
.step { display: flex; align-items: flex-start; gap: 10px; }
.step .num {
  min-width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #2952a3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.step .text {
  font-size: 13px;
  color: #5a4a2a;
  line-height: 1.4;
}
.footer {
  background: #fff;
  padding: 10px 24px;
  text-align: center;
  border-top: 0.5px solid #e0e0e0;
  font-size: 11px;
  color: #888;
}
@media print {
  body { background: #fff; padding: 0; }
  .placard { box-shadow: none; border: none; }
}
</style>
</head>
