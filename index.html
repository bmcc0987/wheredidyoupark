<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f3;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .number {
      font-size: 140px;
      font-weight: 700;
      color: #111;
      line-height: 1;
    }
    .label {
      font-size: 16px;
      color: #999;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="number" id="num">6</div>
    <div class="label">your number</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const n = params.get('n');
    if (n) document.getElementById('num').textContent = n;
  </script>
</body>
</html>
